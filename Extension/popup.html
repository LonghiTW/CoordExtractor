<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>CoordExtractor</title>
</head>

<body>
    <h4>CoordExtractor</h4>
    <p>A coordinate extraction tool for map services.<br>
    <a href="https://github.com/LonghiTW/CoordExtractor" target="_blank">Source code on Github</a></p>

    <!-- Live Preview Section -->
    <div class="settings-group" style="background: #eef5ff; border-color: #cfe2ff;">
        <div class="section-title" style="color: #0d6efd;">Live Preview</div>
        <div id="livePreview"
            style="font-family: 'Consolas', 'Monaco', monospace; font-size: 0.95rem; word-break: break-all; color: #0d6efd; padding: 8px; border: 1px dashed #0d6efd; border-radius: 6px; background: #fff; text-align: center; min-height: 40px; display: flex; align-items: center; justify-content: center;">
            /tpll 25.033668, 121.564816
        </div>
    </div>

    <!-- Copy Format Section -->
    <div class="settings-group">
        <div class="section-title">Copy Format</div>
        <div class="mb-2 row align-items-center">
            <div class="col-3 text-end">
                <label class="form-label">Prefix:</label>
            </div>
            <div class="col-9">
                <div class="btn-group btn-group-sm btn-group-equal" role="group">
                    <input type="radio" class="btn-check" name="prefix" id="prefixTpll" value="tpll" checked>
                    <label class="btn btn-outline-primary" for="prefixTpll">/tpll</label>
                    <input type="radio" class="btn-check" name="prefix" id="prefixUpll" value="upll">
                    <label class="btn btn-outline-primary" for="prefixUpll">/upll</label>
                    <input type="radio" class="btn-check" name="prefix" id="prefixNone" value="none">
                    <label class="btn btn-outline-primary" for="prefixNone">None</label>
                </div>
            </div>
        </div>
        <div class="row align-items-center">
            <div class="col-3 text-end">
                <label class="form-label">Elevation:</label>
            </div>
            <div class="col-9">
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" id="includeElev">
                        <label class="form-check-label" for="includeElev">Include</label>
                    </div>
                    <div class="form-check mb-0" id="distortionWrap"
                        style="opacity: 0.4; pointer-events: none; transition: opacity 0.2s;">
                        <input class="form-check-input" type="checkbox" id="applyDistortion">
                        <label class="form-check-label" for="applyDistortion">Distortion</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Coordinate Offset Section -->
    <div class="settings-group">
        <div class="section-title">Coordinate Offset</div>
        <div class="mb-3 row">
            <div class="col-3 text-end">
                <label for="offset" class="form-label">Mode:</label>
            </div>
            <div class="col-9">
                <select class="form-select form-select-sm" id="offset">
                    <option value="none" selected>None</option>
                    <option value="latlon">Lat & Lon</option>
                    <option value="btexz">BTE X & Z</option>
                </select>
            </div>
        </div>

        <!-- From input -->
        <div id="fromInput" class="mb-3 row input-container">
            <div class="col-3 text-end">
                <label for="fromOffset" class="form-label">From:</label>
            </div>
            <div class="col-9">
                <input type="text" class="form-control form-control-sm" id="fromOffset" placeholder="Lat, Lon" />
                <span class="clear-btn" data-clear="fromOffset">&#10005;</span>
            </div>
        </div>

        <!-- To input -->
        <div id="toInput" class="mb-3 row input-container">
            <div class="col-3 text-end">
                <label for="toOffset" class="form-label">To:</label>
            </div>
            <div class="col-9">
                <input type="text" class="form-control form-control-sm" id="toOffset" placeholder="Lat, Lon" />
                <span class="clear-btn" data-clear="toOffset">&#10005;</span>
            </div>
        </div>

        <!-- X input -->
        <div id="xInput" class="mb-3 row input-container">
            <div class="col-3 text-end">
                <label for="xOffset" class="form-label">X Offset:</label>
            </div>
            <div class="col-9">
                <input type="number" class="form-control form-control-sm" id="xOffset" step="0.0125" />
                <span class="clear-btn" data-clear="xOffset">&#10005;</span>
            </div>
        </div>

        <!-- Z input -->
        <div id="zInput" class="mb-3 row input-container">
            <div class="col-3 text-end">
                <label for="zOffset" class="form-label">Z Offset:</label>
            </div>
            <div class="col-9">
                <input type="number" class="form-control form-control-sm" id="zOffset" step="0.0125" />
                <span class="clear-btn" data-clear="zOffset">&#10005;</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
